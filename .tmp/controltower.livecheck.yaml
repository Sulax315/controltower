app:
  product_name: Control Tower
  environment: local-livecheck

sources:
  schedulelab:
    published_root: C:/Dev/ScheduleLab/schedule_validator/published
  profitintel:
    database_path: C:/Dev/ProfitIntel/data/runtime/profitintel.db
    validation_search_roots:
      - C:/Dev/ProfitIntel/data/runtime
      - C:/Dev/ProfitIntel/artifacts/validation

identity:
  registry_path: C:/Dev/ControlTower/config/project_registry.yaml

obsidian:
  vault_root: C:/Dev/ControlTower/.tmp/livecheck_vault
  projects_folder: "02 Projects"
  exports_folder: "10 Exports"
  timestamped_weekly_notes: true
  rolling_portfolio_note_name: "Portfolio Weekly Summary"
  rolling_project_brief_name: "Weekly Brief"
  canonical_dossier_suffix: "Dossier"

runtime:
  state_root: C:/Dev/ControlTower/.tmp/livecheck_runtime
  retention:
    run_history_limit: 30
    release_history_limit: 12
    operations_history_limit: 60
    diagnostics_history_limit: 30
    log_file_limit: 60

ui:
  host: 127.0.0.1
  port: 8787
