app:
  product_name: Control Tower
  environment: local
  public_base_url:

sources:
  schedulelab:
    published_root: ../ScheduleLab/schedule_validator/published
  profitintel:
    database_path: ../ProfitIntel/data/runtime/profitintel.db
    validation_search_roots:
      - ../ProfitIntel/data/runtime
      - ../ProfitIntel/artifacts/validation

identity:
  registry_path:

obsidian:
  vault_root: ./.tmp/demo_vault
  projects_folder: "02 Projects"
  exports_folder: "10 Exports"
  timestamped_weekly_notes: true
  rolling_portfolio_note_name: "Portfolio Weekly Summary"
  rolling_project_brief_name: "Weekly Brief"
  canonical_dossier_suffix: "Dossier"

runtime:
  state_root: ./.controltower_runtime
  retention:
    run_history_limit: 30
    release_history_limit: 12
    operations_history_limit: 60
    diagnostics_history_limit: 30
    log_file_limit: 60

ui:
  host: 127.0.0.1
  port: 8787

notifications:
  provider: runtime_log

execution:
  provider: file
  webhook_url:
  file_dir: ./.controltower_runtime/orchestration/execution_queue
  webhook_timeout_ms: 5000
  dead_letter_dir: ./.controltower_runtime/orchestration/dead_letter
  max_attempts: 3
  retry_backoff_ms: 1000
  retry_backoff_multiplier: 2
  guarded_packs:
    - deploy_pack
    - release_readiness_pack
  allow_guarded_in_prod: false
  result_ingest_enabled: true
  event_version: v1

review:
  mode: dev
  shared_token:
  token_header: X-ControlTower-Review-Token
  session_secret:
  operator_username:
  operator_password:
  session_cookie_name: controltower_review_session

auth:
  mode: dev
  session_secret:
  username:
  password:
  session_cookie_name: controltower_app_session

autonomy:
  enabled: true
  auto_approve_low_risk: true
  escalate_high_risk: true
  policy_version: v1
  notify_on_auto_approve: false
